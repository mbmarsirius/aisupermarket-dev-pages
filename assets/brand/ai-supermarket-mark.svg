<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">AI Supermarket mark</title>
  <desc id="desc">Square black, red, and green AI Supermarket app icon with AS monogram, shelves, scanner beam, barcode, and fact cube.</desc>
